spring:
  datasource:
    url: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
    username: postgres.msxpzgqxtxqyhgqjajfs
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 120000
      leak-detection-threshold: 40001
      data-source-properties:
        preparethreshold: 0

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}
  service-role-key: ${SUPABASE_SECRET_KEY}
cors:
  allowed-origins: "http://localhost:5173"